<script>
async function upload() {
  const file = document.getElementById('file').files[0];
  const token = new URLSearchParams(window.location.search).get('token');
  if (!file) return alert("Selecciona una imagen");
  if (!token) return alert("Falta ?token= en la URL");

  const status = document.getElementById("status");
  status.innerText = "Preparando subida...";

  // 1) pedir URL firmada a tu API
  const r = await fetch('/api/upload-url?token=' + encodeURIComponent(token), {
    method: 'POST'
  });
  if (!r.ok) {
    status.innerText = "Error: " + await r.text();
    return;
  }
  const { url } = await r.json();

  // 2) subir directo al Blob (PUT)
  status.innerText = "Subiendo al storage...";
  const putRes = await fetch(url, {
    method: "PUT",
    headers: {
      "Content-Type": file.type || "image/jpeg"
    },
    body: file
  });

  if (!putRes.ok) {
    status.innerText = "Error subiendo: " + (await putRes.text());
    return;
  }

  status.innerText = "Listo ✅ Menú actualizado";
}
</script>
