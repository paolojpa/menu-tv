<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin - Subir Menú</title>
</head>
<body style="font-family:Arial;background:#111;color:white;display:flex;align-items:center;justify-content:center;height:100vh">

<div style="background:#222;padding:30px;border-radius:10px;width:400px">
  <h2>Subir Menú del Día</h2>
  <input type="file" id="file" accept="image/*"><br><br>
  <button onclick="upload()">Subir</button>
  <div id="status" style="margin-top:15px"></div>
</div>

<script>
async function upload() {
  const file = document.getElementById('file').files[0];
  const token = new URLSearchParams(window.location.search).get('token');
  if (!file) return alert("Selecciona una imagen");
  if (!token) return alert("Falta ?token= en la URL");

  const fd = new FormData();
  fd.append("file", file);

  document.getElementById("status").innerText = "Subiendo...";

  const res = await fetch('/api/upload?token=' + token, {
    method: 'POST',
    body: fd
  });

  if (!res.ok) {
    document.getElementById("status").innerText = "Error: " + await res.text();
    return;
  }

  document.getElementById("status").innerText = "Listo ✅ Menú actualizado";
}
</script>

</body>
</html>
