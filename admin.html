<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Subir Menú del Día</title>
  <style>
    body{
      margin:0;
      background:#0b0b0b;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px
    }
    .card{
      width:min(720px,100%);
      background:#151515;
      border:1px solid #2a2a2a;
      border-radius:20px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.45)
    }
    h1{
      margin:0 0 18px;
      font-size:44px;
      letter-spacing:.5px
    }
    .row{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap
    }
    input[type=file]{
      background:#222;
      border:1px solid #333;
      padding:10px;
      border-radius:10px;
      color:#fff
    }
    button{
      background:#fff;
      color:#000;
      border:0;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer
    }
    button:disabled{
      opacity:.55;
      cursor:not-allowed
    }
    #status{
      margin-top:14px;
      opacity:.95;
      min-height:22px
    }
    .hint{
      margin-top:10px;
      opacity:.6;
      font-size:14px
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Subir Menú del Día</h1>

      <div class="row">
        <input id="file" type="file" accept="image/*" />
        <button id="btn" onclick="upload()">Subir</button>
      </div>

      <div id="status">Listo para subir.</div>
      <div class="hint">
        Abre esta página como <b>/admin.html?token=TU_TOKEN</b>
      </div>
    </div>
  </div>

<script>
async function upload(){
  const fileInput = document.getElementById('file');
  const file = fileInput.files[0];
  const token = new URLSearchParams(location.search).get('token');
  const status = document.getElementById('status');
  const btn = document.getElementById('btn');

  if(!token){
    status.textContent = '❌ Falta token en la URL: /admin.html?token=...';
    return;
  }

  if(!file){
    status.textContent = '❌ Selecciona una imagen.';
    return;
  }

  btn.disabled = true;
  status.textContent = '⏳ Subiendo imagen...';

  try {
    const fd = new FormData();
    fd.append('file', file);

    const response = await fetch('/api/upload?token=' + encodeURIComponent(token), {
      method: 'POST',
      body: fd
    });

    const text = await response.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      data = { error: text };
    }

    if(!response.ok){
      status.textContent = `❌ Error (${response.status}): ${data.error || text}`;
      btn.disabled = false;
      return;
    }

    status.textContent = '✅ Menú actualizado correctamente.';
    fileInput.value = '';

  } catch (err){
    status.textContent = '❌ Error inesperado: ' + (err?.message || err);
  }

  btn.disabled = false;
}
</script>
</body>
</html>
