<script>
async function upload() {
  const file = document.getElementById('file').files[0];
  const token = new URLSearchParams(window.location.search).get('token');
  const status = document.getElementById("status");

  if (!file) return alert("Selecciona imagen");
  if (!token) return alert("Falta token");

  status.innerText = "Generando URL...";

  const r = await fetch('/api/upload-url?token=' + token, {
    method: "POST"
  });

  if (!r.ok) {
    status.innerText = await r.text();
    return;
  }

  const { url } = await r.json();

  status.innerText = "Subiendo...";

  const uploadRes = await fetch(url, {
    method: "PUT",
    headers: {
      "Content-Type": file.type || "image/jpeg"
    },
    body: file
  });

  if (!uploadRes.ok) {
    status.innerText = "Error al subir";
    return;
  }

  status.innerText = "Listo ✅ Menú actualizado";
}
</script>
