<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Subir Menú del Día</title>
  <style>
    body{margin:0;background:#0b0b0b;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(720px,100%);background:#151515;border:1px solid #2a2a2a;border-radius:20px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
    h1{margin:0 0 18px;font-size:44px;letter-spacing:.5px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    input[type=file]{background:#222;border:1px solid #333;padding:10px;border-radius:10px;color:#fff}
    button{background:#fff;color:#000;border:0;padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer}
    button:disabled{opacity:.55;cursor:not-allowed}
    #status{margin-top:14px;opacity:.9}
    .hint{margin-top:10px;opacity:.7;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Subir Menú del Día</h1>

      <div class="row">
        <input id="file" type="file" accept="image/*" />
        <button id="btn" onclick="upload()">Subir</button>
      </div>

      <div id="status">Listo para subir.</div>
      <div class="hint">Abre esta página como <b>/admin.html?token=TU_TOKEN</b></div>
    </div>
  </div>

  <script>
    async function upload(){
      const file = document.getElementById('file').files[0];
      const token = new URLSearchParams(location.search).get('token');
      const status = document.getElementById('status');
      const btn = document.getElementById('btn');

      if(!token){ status.textContent = 'Falta token en la URL: /admin.html?token=...'; return; }
      if(!file){ status.textContent = 'Selecciona una imagen.'; return; }

      btn.disabled = true;
      status.textContent = 'Generando URL de subida...';

      // 1) pedir URL firmada
      const r = await fetch('/api/upload-url?token=' + encodeURIComponent(token), { method:'POST' });
      const txt = await r.text();
      if(!r.ok){ status.textContent = 'Error: ' + txt; btn.disabled = false; return; }

      const { url } = JSON.parse(txt);

      // 2) subir directo al blob
      status.textContent = 'Subiendo imagen...';
      const putRes = await fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': file.type || 'image/jpeg' },
        body: file
      });

      if(!putRes.ok){
        status.textContent = 'Error subiendo: ' + await putRes.text();
        btn.disabled = false;
        return;
      }

      status.textContent = 'Listo ✅ Menú actualizado.';
      btn.disabled = false;
    }
  </script>
</body>
</html>
