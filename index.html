<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menú del Día</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#141414;
      --panel2:#101010;
      --border:#2a2a2a;
      --text:#ffffff;
      --muted:rgba(255,255,255,.75);
    }

    html, body{
      height:100%;
      margin:0;
      background: radial-gradient(1200px 800px at 20% 10%, #1a1a1a, var(--bg));
      color:var(--text);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }

    .layout{
      height:100vh;
      display:grid;
      grid-template-columns: 40% 60%;
    }

    .left{
      padding:48px;
      display:flex;
      flex-direction:column;
      gap:24px;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius:24px;
      padding:28px 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
    }

    .title{
      margin:0;
      font-size: clamp(40px, 4vw, 64px);
      letter-spacing: .6px;
      text-transform: uppercase;
      line-height:1.05;
    }

    .prices{
      margin-top:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      font-size: clamp(22px, 2vw, 30px);
      color:var(--muted);
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:18px;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .row:last-child{ border-bottom:none; }

    .label{ color: rgba(255,255,255,.78); }
    .value{ color: #fff; font-weight:700; }

    .note{
      margin-top:auto;
      color: rgba(255,255,255,.55);
      font-size: 14px;
    }

    .right{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:26px;
    }

    .imgWrap{
      width:100%;
      height:100%;
      background: rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 30px 80px rgba(0,0,0,.55);
      overflow:hidden;
    }

    #menuImg{
      width:100%;
      height:100%;
      object-fit: contain;
      display:block;
    }

    /* Para pantallas verticales (TV girada / móvil) */
    @media (max-width: 900px){
      .layout{ grid-template-columns: 1fr; }
      .left{ padding:24px; }
      .right{ padding:18px; height:60vh; }
    }
  </style>
</head>

<body>
  <div class="layout">
    <div class="left">
      <div class="card">
        <h1 class="title">Menú del Día</h1>

        <div class="prices">
          <div class="row">
            <div class="label">Almuerzo Ejecutivo</div>
            <div class="value">$6.990</div>
          </div>
          <div class="row">
            <div class="label">Colación</div>
            <div class="value">$4.990</div>
          </div>
          <div class="row">
            <div class="label">Agregado</div>
            <div class="value">$1.500</div>
          </div>
        </div>
      </div>

      <div class="note">Actualiza automático cada 15s.</div>
    </div>

    <div class="right">
      <div class="imgWrap">
        <img id="menuImg" alt="Menú" />
      </div>
    </div>
  </div>

<script>
let lastV = null;

async function refresh() {
  const r = await fetch('/api/version', { cache: 'no-store' });
  const data = await r.json();

  if (data.v !== lastV && data.url) {
    lastV = data.v;
    document.getElementById('menuImg').src = data.url + '?v=' + data.v;
  }
}

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
