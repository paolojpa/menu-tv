<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Menú del Día</title>
</head>
<body style="margin:0;background:#111;color:white;font-family:Arial">

<div style="display:grid;grid-template-columns:40% 60%;height:100vh">
  <div style="padding:40px">
    <h1 style="font-size:50px;margin:0">MENÚ DEL DÍA</h1>
    <div style="font-size:28px;margin-top:30px">
      <div>Almuerzo Ejecutivo — $6.990</div>
      <div>Colación — $4.990</div>
      <div>Agregado — $1.500</div>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:center">
    <img id="menuImg" style="max-width:95%;max-height:95%">
  </div>
</div>

<script>
let lastV = null;

async function refresh() {
  const r = await fetch('/api/version', { cache: 'no-store' });
  const data = await r.json();

  if (data.v !== lastV && data.url) {
    lastV = data.v;
    document.getElementById('menuImg').src = data.url + '?v=' + data.v;
  }
}

refresh();
setInterval(refresh, 15000);
</script>

</body>
</html>
