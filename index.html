<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menú del Día</title>
  <style>
    :root{
      --yellow:#f6d86a;
      --black:#0b0b0b;
      --white:#fff;
    }

    html,body{
      height:100%;
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:#111;
    }

    /* Layout general: header arriba + imagen abajo */
    .page{
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* Header estilo afiche */
    .hero{
      background: var(--yellow);
      color:#111;
      padding: 26px 34px 18px;
      position:relative;
      border-bottom: 10px solid rgba(0,0,0,.06);
    }

    .heroTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
    }

    .logoBox{
      width:190px;
      height:70px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      font-weight:700;
      opacity:.85;
    }

    .logoBox.right{
      justify-content:flex-end;
    }

    .titleWrap{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .title{
      display:inline-block;
      background:#000;
      color:#fff;
      padding: 14px 26px;
      font-weight:900;
      letter-spacing:1px;
      font-size: clamp(34px, 4vw, 72px);
      text-transform: uppercase;
      border-radius: 6px;
    }

    /* 3 columnas de combos/precios */
    .plans{
      margin-top: 18px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      align-items:start;
    }

    .plan{
      text-align:center;
      padding: 10px 8px;
    }

    .price{
      font-weight:900;
      font-size: clamp(28px, 2.6vw, 54px);
      margin-bottom: 10px;
    }

    .badge{
      display:inline-block;
      background:#000;
      color:#fff;
      padding: 10px 16px;
      font-weight:900;
      font-size: clamp(18px, 1.8vw, 36px);
      text-transform: uppercase;
      border-radius: 6px;
    }

    .plus{
      margin-top:10px;
      font-weight:900;
      font-size: clamp(18px, 1.8vw, 34px);
      line-height:1.05;
      text-transform: uppercase;
    }

    .foot{
      margin-top: 14px;
      text-align:center;
      font-size: clamp(12px, 1.2vw, 20px);
      letter-spacing: .5px;
      padding-bottom: 6px;
      opacity:.9;
    }

    /* Zona de imagen debajo */
    .imgArea{
      flex:1;
      background:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      overflow:hidden;
    }

    .imgFrame{
      width: 100%;
      height: 100%;
      max-width: 1400px; /* ajustable */
      border-radius: 18px;
      overflow:hidden;
      background: rgba(255,255,255,.04);
      box-shadow: 0 30px 90px rgba(0,0,0,.6);
      border: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #menuImg{
      width:100%;
      height:100%;
      object-fit: cover; /* cover si quieres que llene recortando */
      display:block;
    }

    /* Responsive: si es angosto, apila planes */
    @media (max-width: 900px){
      .logoBox{ display:none; }
      .plans{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- HEADER (estilo afiche) -->
    <header class="hero">
      <div class="heroTop">
        <div class="logoBox">LOGO IZQ</div>

        <div class="titleWrap">
          <div class="title">MENÚ DEL DÍA</div>
        </div>

        <div class="logoBox right">LOGO DER</div>
      </div>

      <div class="plans">
        <div class="plan">
          <div class="price">$4.100</div>
          <div class="badge">Plato de Fondo</div>
        </div>

        <div class="plan">
          <div class="price">$4.600</div>
          <div class="badge">Plato de Fondo</div>
          <div class="plus">+<br>Postre o<br>Ensalada</div>
        </div>

        <div class="plan">
          <div class="price">$5.100</div>
          <div class="badge">Plato de Fondo</div>
          <div class="plus">+<br>Postre y<br>Ensalada</div>
        </div>
      </div>

      <div class="foot">
        Todos los menús incluyen pan, sopa y jugo o agua • Menús válidos hasta agotar stock.
      </div>
    </header>

    <!-- IMAGEN DE MENU DEBAJO -->
    <main class="imgArea">
      <div class="imgFrame">
        <img id="menuImg" alt="Menú" />
      </div>
    </main>

  </div>

<script>
let lastV = null;

async function refresh() {
  const r = await fetch('/api/version', { cache: 'no-store' });
  const data = await r.json();

  if (data.v !== lastV && data.url) {
    lastV = data.v;
    document.getElementById('menuImg').src = data.url + '?v=' + data.v;
  }
}

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
